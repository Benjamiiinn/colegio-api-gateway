server:
  port: 9090

spring:
  main:
      web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: user-service
            uri: http://localhost:9091
            predicates:
              - Path=/api/v1/usuarios/**, /api/v1/auth/**
            filters:
              - name: CircuitBreaker
                args:
                  name: userServiceCB
                  fallbackUri: forward:/fallback/userServiceFallback

          - id: academy-service
            uri: http://localhost:9092
            predicates:
              - Path=/api/v1/cursos/**, /api/v1/asignaturas/**, /api/v1/matriculas/**, /api/v1/calificaciones/**
            filters:
              - name: CircuitBreaker
                args:
                  name: academyServiceCB
                  fallbackUri: forward:/fallback/academyServiceFallback

          - id: records-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/asistencias/**, /api/v1/anotaciones/**
            filters:
              - name: CircuitBreaker
                args:
                  name: recordsServiceCB
                  fallbackUri: forward:/fallback/recordsServiceFallback
      httpclient:
        connect-timeout: 20000
        response-timeout: 120s

resilience4j:
  circuitbreaker:
    config:
      default:
        timeout: 30s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
      instances:
        userServiceCB:
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          failureRateThreshold: 50
          waitDurationInOpenState: 10s
        academyServiceCB:
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          failureRateThreshold: 50
          waitDurationInOpenState: 10s
        recordServiceCB:
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          failureRateThreshold: 50
          waitDurationInOpenState: 10s
  timelimiter:
    instances:
      userServiceCB:
        timeoutDuration: 30s
        cancelRunningFuture: true
      academyServiceCB:
        timeoutDuration: 30s
        cancelRunningFuture: true
      recordServiceCB:
        timeoutDuration: 30s
        cancelRunningFuture: true

logging:
  level:
    resilience4j: DEBUG
    io.github.resilience4j: DEBUG