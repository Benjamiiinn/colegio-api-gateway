server:
  port: 9090

spring:
  main:
      web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
          - id: user-service
            uri: http://localhost:9091
            predicates:
              - Path=/api/v1/usuarios/**, /api/v1/auth/**
            filters:
              - name: CircuitBreaker
                args:
                  name: userServiceCB
                  fallbackUri: forward:/fallback/userServiceFallback

          - id: academy-service
            uri: http://localhost:9092
            predicates:
              - Path=/api/v1/cursos/**, /api/v1/asignaturas/**, /api/v1/matriculas/**, /api/v1/calificaciones/**
            filters:
              - name: CircuitBreaker
                args:
                  name: academyServiceCB
                  fallbackUri: forward:/fallback/academyServiceFallback

resilience4j:
  circuitbreaker:
    instances:
      userServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
      academyServiceCB:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
